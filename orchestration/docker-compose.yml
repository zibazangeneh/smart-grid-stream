version: '3.8'

# ── Shared Airflow config ──────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'smart-grid-secret'
    # Snowflake credentials — set these before docker compose up
    SNOWFLAKE_ACCOUNT:   ${SNOWFLAKE_ACCOUNT:-bxhqszl-ur89326}
    SNOWFLAKE_USER:      ${SNOWFLAKE_USER:-ZIBAZNGNH}
    SNOWFLAKE_PASSWORD:  ${SNOWFLAKE_PASSWORD}
    SNOWFLAKE_DATABASE:  SMART_GRID_DB
    SNOWFLAKE_WAREHOUSE: SMART_GRID_WH
    KAFKA_BROKER:        host.docker.internal:9092
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./dbt_profiles:/opt/airflow/dbt_profiles
    - ../smart_grid_dbt:/opt/smart_grid_dbt
    - ../load_to_snowflake.py:/opt/load_to_snowflake.py
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:

  # ── Metadata database ────────────────────────────────────────────────────────
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── One-time init (creates DB schema + admin user) ───────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install dbt-snowflake==1.11.5 snowflake-connector-python pandas pyarrow &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Ziba \
          --lastname Zangenehpourzadeh \
          --role Admin \
          --email ziba.zangeneh@gmail.com \
          --password admin
    restart: "no"

  # ── Webserver — UI at http://localhost:8081 ──────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # ── Scheduler ────────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always

volumes:
  airflow-db:
