name: dbt CI

on:
  pull_request:
    branches: [main]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.5

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          python -c "
          import os
          lines = [
            'smart_grid:',
            '  target: ci',
            '  outputs:',
            '    ci:',
            '      type: snowflake',
            '      account: dummy',
            '      user: dummy',
            '      password: dummy',
            '      role: ACCOUNTADMIN',
            '      warehouse: SMART_GRID_WH',
            '      database: SMART_GRID_DB',
            '      schema: CI',
            '      threads: 4',
          ]
          open(os.path.expanduser('~/.dbt/profiles.yml'), 'w').write('\n'.join(lines))
          print('profiles.yml written')
          "

      - name: Install dbt packages
        working-directory: smart_grid_dbt
        run: dbt deps

      - name: dbt parse (validates Jinja + SQL syntax, no DB connection)
        working-directory: smart_grid_dbt
        run: dbt parse
