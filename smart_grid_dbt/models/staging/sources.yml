version: 2

sources:
  - name: raw
    database: SMART_GRID_DB
    schema: RAW
    tables:
      - name: meter_readings
        description: "Raw smart meter readings loaded from Silver Delta Lake layer"
        columns:
          - name: meter_id
            description: "Unique smart meter identifier"
            data_tests:
              - not_null
          - name: kwh_reading
            description: "Power consumption in kilowatt-hours"
            data_tests:
              - not_null
          - name: grid_zone
            description: "German grid zone"
            data_tests:
              - not_null
              - accepted_values:
                  values: ["NRW-North", "NRW-South", "Bavaria", "Saxony", "Hamburg"]
          - name: meter_type
            description: "Type of meter"
            data_tests:
              - not_null
              - accepted_values:
                  values: ["residential", "commercial", "industrial"]
